name: Bruhust CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  #  Job 1: Build & Unit Tests
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }} toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-

      - name: Check formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --verbose

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run Rust unit tests
        run: cargo test --verbose

  # ─────────────────────────────────────────────
  #  Job 2: Integration Tests — run .bruh files
  # ─────────────────────────────────────────────
  bruh-integration-tests:
    name: Integration Tests (.bruh) 
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-stable-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build bruhust binary
        run: cargo build --release

      - name: Run all .bruh integration tests 
        run: bash scripts/run_tests.sh

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruh-test-results
          path: test-results/

  # ─────────────────────────────────────────────
  #  Job 3: Security audit
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit


  # ─────────────────────────────────────────────
  #  Job 4: Release binaries (tags only)
  # ─────────────────────────────────────────────
  release:
    name: Release Binaries 
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    needs: [build-and-test, bruh-integration-tests]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bruhust-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bruhust-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: bruhust-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bruhust-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/bruhust ${{ matrix.artifact }}
      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/bruhust.exe ${{ matrix.artifact }}
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
